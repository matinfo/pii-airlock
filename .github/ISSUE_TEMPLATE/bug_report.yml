name: Bug report
description: Something doesn't work as documented
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security vulnerabilities**, do not file a
        public issue — see [SECURITY.md](../../SECURITY.md).
        **Never paste real PII or a mapping file.** Use fake data in examples.
  - type: input
    id: version
    attributes:
      label: pii-airlock version
      placeholder: "e.g. 0.2.0  (pii-airlock --version)"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.4"
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Which workflow?
      options: [CLI pipe, Gateway (proxy), Claude Code hooks, Other]
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal commands or code. Use fake data only.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true
