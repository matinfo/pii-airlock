name: Publish to PyPI

# Publishes on a GitHub Release. Uses PyPI Trusted Publishing (OIDC) — no API
# token stored in the repo. One-time setup: create the project's trusted
# publisher on PyPI (https://docs.pypi.org/trusted-publishers/) pointing at this
# repo + workflow, and create a "pypi" environment in the repo settings.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
