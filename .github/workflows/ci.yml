name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full Python range on Linux; representative versions on macOS + Windows
        # to prove cross-OS behaviour without a 15-job matrix.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        # Unit tests stub out Presidio/spaCy, so no model download is needed.
        # The proxy tests exercise the real ASGI stack with a mocked upstream.
        run: pytest -q
